<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingPong Admin Menedzsment</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = { darkMode: 'class', }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 4px solid #4F46E5; color: #4F46E5; font-weight: 700; }
        .tab-inactive { border-bottom: 4px solid transparent; color: #6B7280; font-weight: 500; }
        .tab-inactive:hover { color: #374151; border-color: #D1D5DB; }
        .dark .tab-inactive { color: #9CA3AF; }
        .dark .tab-inactive:hover { color: #E5E7EB; border-color: #4B5563; }
        .dark .tab-active { color: #818CF8; border-color: #818CF8; }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen">

<header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1 class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight" data-i18n="title">Klub Adminisztráció</h1>
            </div>

            <div class="flex items-center gap-4">

                <div class="flex bg-slate-100 dark:bg-slate-700 rounded-lg p-1 border border-slate-200 dark:border-slate-600">
                    <button id="lang-hu" onclick="setLanguage('hu')" class="px-2 py-1 text-xs font-bold rounded hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-800 dark:text-white">HU</button>
                    <button id="lang-en" onclick="setLanguage('en')" class="px-2 py-1 text-xs font-bold rounded opacity-50 hover:bg-white dark:hover:bg-slate-600 transition-colors text-slate-800 dark:text-white">EN</button>
                </div>

                <button onclick="toggleDarkMode()" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 transition-colors" title="Sötét/Világos mód">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>

                <div id="wsStatus" class="inline-flex items-center gap-1.5 rounded-full bg-slate-100 dark:bg-slate-700 px-3 py-1 text-sm font-semibold text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 shadow-sm transition-colors">
                    <span class="w-2 h-2 rounded-full bg-slate-400" id="wsDot"></span>
                    <span id="wsText" data-i18n="ws_connecting">WS Csatlakozás...</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div id="status" class="hidden w-full p-4 mb-6 rounded-lg font-medium text-sm text-center transition-all duration-300"></div>

    <nav class="flex space-x-8 border-b border-slate-200 dark:border-slate-700 mb-8" aria-label="Tabs">
        <button onclick="switchTab('teamsTab')" id="btn-teamsTab" class="tab-active pb-4 px-1 text-base transition-colors duration-200" data-i18n="tab_teams">
            Csapatok & Ligák
        </button>
        <button onclick="switchTab('matchesTab')" id="btn-matchesTab" class="tab-inactive pb-4 px-1 text-base transition-colors duration-200" data-i18n="tab_matches">
            Mérkőzések
        </button>
        <button onclick="switchTab('systemTab')" id="btn-systemTab" class="tab-inactive pb-4 px-1 text-base transition-colors duration-200" data-i18n="tab_system">
            Rendszer & Értesítések
        </button>
    </nav>

    <div id="teamsTab" class="tab-content block">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-4" data-i18n="new_team_title">Új Csapat Létrehozása</h2>
                    <form id="addTeamForm" onsubmit="addTeam(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="club_label">Klub*</label>
                            <select id="teamClub" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="team_name_label">Csapat Név*</label>
                            <input type="text" id="teamName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="division_label">Divízió / Osztály</label>
                            <input type="text" id="teamDivision" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="captain_label">Csapatkapitány*</label>
                            <select id="teamCaptain" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <button type="submit" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-4 rounded-lg transition-all" data-i18n="save_btn">Mentés</button>
                    </form>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-4" data-i18n="new_club_title">Új Klub Létrehozása</h2>
                    <form id="addClubForm" onsubmit="addClub(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="club_name_label">Klub Neve*</label>
                            <input type="text" id="clubName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1" data-i18n="address_label">Cím*</label>
                            <input type="text" id="clubAddress" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 dark:text-white rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                        </div>
                        <button type="submit" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-lg transition-all" data-i18n="save_club_btn">Klub Mentése</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                        <h2 class="text-lg font-bold text-slate-800 dark:text-white" data-i18n="teams_title">Csapatok</h2>
                        <button onclick="fetchTeams()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 px-3 rounded-lg text-sm" data-i18n="refresh_btn">Frissítés</button>
                    </div>
                    <div class="p-6"><div id="teamsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
                </div>

                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                        <h2 class="text-lg font-bold text-slate-800 dark:text-white" data-i18n="clubs_title">Klubok</h2>
                        <button onclick="fetchClubs()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 px-3 rounded-lg text-sm" data-i18n="refresh_btn">Frissítés</button>
                    </div>
                    <div class="p-6"><div id="clubsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="matchesTab" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 sticky top-24">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white mb-4" data-i18n="new_match_title">Új Mérkőzés Kiírása</h2>
                    <form id="addMatchForm" onsubmit="addMatch(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="season_label">Szezon*</label>
                            <select id="matchSeason" required class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="round_label">Kör (Forduló)*</label>
                            <input type="number" id="matchRound" required min="1" class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="home_team_label">Hazai Csapat*</label>
                            <select id="matchHomeTeam" required class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="guest_team_label">Vendég Csapat*</label>
                            <select id="matchGuestTeam" required class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="datetime_label">Dátum és Időpont*</label>
                            <input type="datetime-local" id="matchDate" required class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold dark:text-slate-300 mb-1" data-i18n="location_label">Helyszín*</label>
                            <input type="text" id="matchLocation" required class="w-full px-4 py-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <button type="submit" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition-colors" data-i18n="create_match_btn">Mérkőzés Létrehozása</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                        <h2 class="text-lg font-bold text-slate-800 dark:text-white" data-i18n="scheduled_matches_title">Kiírt Mérkőzések</h2>
                        <button onclick="fetchMatches()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1.5 px-3 rounded-lg text-sm" data-i18n="refresh_btn">Frissítés</button>
                    </div>
                    <div class="p-6"><div id="matchesContainer" class="space-y-4"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="systemTab" class="tab-content hidden">
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 max-w-2xl">
            <div class="flex items-start gap-4">
                <div class="p-3 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                </div>
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-slate-800 dark:text-white" data-i18n="fcm_title">Push Értesítések Tesztelése (FCM)</h2>
                    <p class="text-sm text-slate-600 dark:text-slate-400 mt-1 mb-4" data-i18n="fcm_desc">A Firebase Cloud Messaging (FCM) rendszer tesztelése...</p>

                    <div class="flex items-center gap-4 bg-slate-50 dark:bg-slate-700 p-4 rounded-lg border border-slate-200 dark:border-slate-600">
                        <button onclick="registerFCMToken()" class="bg-slate-800 dark:bg-slate-600 hover:bg-slate-900 dark:hover:bg-slate-500 text-white font-bold py-2 px-4 rounded-lg transition duration-200 shadow-sm text-sm" data-i18n="send_token_btn">Teszt Token Küldése</button>
                        <span id="fcmStatus" class="text-sm font-semibold text-slate-500 dark:text-slate-400" data-i18n="waiting">Várakozás...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="editClubModal" class="hidden fixed inset-0 bg-slate-900/50 z-50 items-center justify-center backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-xl p-6 w-full max-w-md shadow-2xl border border-slate-200 dark:border-slate-700">
        <h2 class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Klub Szerkesztése</h2>
        <form id="editClubForm" onsubmit="saveClubEdit(event)" class="space-y-4">
            <input type="hidden" id="editClubId">
            <div>
                <label class="block text-sm font-semibold mb-1 dark:text-slate-300">Név</label>
                <input type="text" id="editClubName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1 dark:text-slate-300">Cím</label>
                <input type="text" id="editClubAddress" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg dark:text-white outline-none">
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="closeEditClubModal()" class="px-4 py-2 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">Mégse</button>
                <button type="submit" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700 transition-colors">Mentés</button>
            </div>
        </form>
    </div>
</div>

<div id="editTeamModal" class="hidden fixed inset-0 bg-slate-900/50 z-50 items-center justify-center backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-800 rounded-xl p-6 w-full max-w-lg shadow-2xl border border-slate-200 dark:border-slate-700 max-h-[90vh] flex flex-col">
        <h2 class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Csapat Szerkesztése</h2>
        <form id="editTeamForm" onsubmit="saveTeamEdit(event)" class="space-y-4 overflow-y-auto pr-2 custom-scrollbar">
            <input type="hidden" id="editTeamId">
            <div>
                <label class="block text-sm font-semibold mb-1 dark:text-slate-300">Csapat Név</label>
                <input type="text" id="editTeamName" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1 dark:text-slate-300">Divízió</label>
                <input type="text" id="editTeamDivision" class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg dark:text-white outline-none">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1 dark:text-slate-300">Csapatkapitány</label>
                <select id="editTeamCaptain" required class="w-full px-4 py-2 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg dark:text-white outline-none"></select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2 dark:text-slate-300">Csapattagok kiválasztása</label>
                <div id="editTeamMembersContainer" class="grid grid-cols-2 gap-2 bg-slate-50 dark:bg-slate-700 p-3 rounded-lg border border-slate-200 dark:border-slate-600 max-h-48 overflow-y-auto">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-200 dark:border-slate-700">
                <button type="button" onclick="closeEditTeamModal()" class="px-4 py-2 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">Mégse</button>
                <button type="submit" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition-colors">Mentés</button>
            </div>
        </form>
    </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/clubs.js"></script>
<script src="js/teams.js"></script>
<script src="js/matches.js"></script>
<script src="js/app.js"></script>
</body>
</html>
